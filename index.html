<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <title>Edwin's Hammock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #music-prompt {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 232, 160, 0.7);
      font-family: 'Cinzel', serif;
      font-weight: 400;
      letter-spacing: 0.18em;
      font-size: clamp(10px, 1.4vw, 18px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 25;
      white-space: nowrap;
      animation: promptPulse 2.5s ease-in-out infinite;
    }

    @keyframes promptPulse {
      0%,100% { opacity: 0.3; }
      50%     { opacity: 0.85; }
    }

    .prompt-hide {
      animation: promptFade 1.2s ease-out forwards !important;
    }

    @keyframes promptFade {
      0%   { opacity: 0.85; }
      100% { opacity: 0;    }
    }

    body {
      background: #0a0515;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scene {
      position: relative;
      width: min(100vw, calc(100vh * 2408/1344));
      height: min(100vh, calc(100vw * 1344/2408));
    }

    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    #sky-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 60%;
      pointer-events: none;
      animation: skyShift 12s ease-in-out infinite alternate;
    }

    @keyframes skyShift {
      0%   {
        background: linear-gradient(to bottom, rgba(60,0,120,0) 0%, rgba(255,80,0,0) 100%);
        opacity: 0;
      }
      40%  {
        background: linear-gradient(to bottom, rgba(60,0,120,0.35) 0%, rgba(255,80,0,0.15) 100%);
        opacity: 1;
      }
      100% {
        background: linear-gradient(to bottom, rgba(20,0,60,0.4) 0%, rgba(200,40,0,0.2) 100%);
        opacity: 1;
      }
    }

    #sun-glow {
      position: absolute;
      left: 49.5%;
      top:  47%;
      transform: translate(-50%, -50%);
      width: 18%;
      padding-bottom: 18%;
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: sunPulse 3.5s ease-in-out infinite;
    }

    @keyframes sunPulse {
      0%,100% {
        transform: translate(-50%,-50%) scale(1);
        background: radial-gradient(circle, rgba(255,250,150,0.7) 0%, rgba(255,160,0,0.4) 35%, rgba(255,80,0,0.15) 60%, transparent 75%);
      }
      50% {
        transform: translate(-50%,-50%) scale(1.18);
        background: radial-gradient(circle, rgba(255,255,180,0.9) 0%, rgba(255,180,0,0.55) 35%, rgba(255,100,0,0.2) 60%, transparent 75%);
      }
    }

    #water-canvas {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 28%;
      pointer-events: none;
    }

    #fx-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    /* vignette — strong and visible */
    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 35%,
        rgba(0,0,0,0.45) 70%,
        rgba(0,0,0,0.82) 100%
      );
      z-index: 5;
    }

    #title {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: clamp(18px, 3.5vw, 52px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0% {
        color: #d4a843;
        text-shadow:
          1px 1px 0 #c49030,
          2px 2px 0 #b07820,
          3px 3px 0 #9a6210,
          4px 4px 0 #844e00,
          5px 5px 0 #6e3c00,
          6px 6px 0 #582c00,
          7px 7px 0 #421e00,
          8px 8px 0 #2e1200,
          9px 9px 0 #1a0800,
          9px 9px 8px rgba(0,0,0,0.6);
      }
      100% {
        color: #f0cc60;
        text-shadow:
          1px 1px 0 #d4a843,
          2px 2px 0 #c49030,
          3px 3px 0 #b07820,
          4px 4px 0 #9a6210,
          5px 5px 0 #844e00,
          6px 6px 0 #6e3c00,
          7px 7px 0 #582c00,
          8px 8px 0 #421e00,
          9px 9px 0 #2e1200,
          9px 9px 14px rgba(200,100,0,0.45);
      }
    }

    #sound-btn {
      position: absolute;
      bottom: 20px;
      right:  20px;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,232,160,0.6);
      color: #ffe8a0;
      font-family: 'Cinzel', serif;
      font-weight: 400;
      letter-spacing: 0.18em;
      font-size: clamp(9px, 1vw, 13px);
      padding: 6px 14px;
      cursor: pointer;
      z-index: 20;
      transition: background 0.2s;
    }
    #sound-btn:hover { background: rgba(255,220,120,0.15); }

    #tools-link {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,232,160,0.3);
      color: rgba(255,232,160,0.5);
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(8px, 0.9vw, 11px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 5px 12px;
      z-index: 20;
      transition: color 0.25s, border-color 0.25s, background 0.25s;
    }
    #tools-link:hover {
      color: rgba(255,232,160,0.9);
      border-color: rgba(255,232,160,0.55);
      background: rgba(255,220,120,0.08);
    }
  </style>
</head>
<body>

<div id="scene">
  <img id="bg" src="hammock.png" alt="Edwin's Hammock"/>
  <div id="sky-overlay"></div>
  <div id="sun-glow"></div>
  <canvas id="water-canvas"></canvas>
  <canvas id="fx-canvas"></canvas>
  <div id="vignette"></div>
  <div id="title">Edwin's Hammock</div>
  <div id="music-prompt">♪ &nbsp; click anywhere for music &nbsp; ♪</div>
</div>

<button id="sound-btn" onclick="toggleSound()">♪ SOUND ON</button>
<a id="tools-link" href="/tools/launch-directory/">Tools ↗</a>

<script>
let t = 0;

// ── WATER ──────────────────────────────────────────────────────
const waterCanvas = document.getElementById('water-canvas');
const wc = waterCanvas.getContext('2d');
let wW, wH;

function resizeWater() {
  wW = waterCanvas.offsetWidth;
  wH = waterCanvas.offsetHeight;
  waterCanvas.width  = wW;
  waterCanvas.height = wH;
}
resizeWater();

const WAVES = [
  { y:0.04, amp:3.0, speed:0.030, color:'rgba(255,255,255,0.18)', thick:2 },
  { y:0.14, amp:3.5, speed:0.022, color:'rgba(255,255,255,0.12)', thick:2 },
  { y:0.26, amp:2.8, speed:0.028, color:'rgba(255,255,255,0.10)', thick:2 },
  { y:0.40, amp:3.2, speed:0.018, color:'rgba(255,255,255,0.09)', thick:3 },
  { y:0.55, amp:2.5, speed:0.034, color:'rgba(255,255,255,0.07)', thick:2 },
  { y:0.70, amp:2.0, speed:0.024, color:'rgba(255,255,255,0.06)', thick:2 },
  { y:0.85, amp:1.6, speed:0.020, color:'rgba(255,255,255,0.05)', thick:2 },
];

const RIPPLES = [
  { phase: 0,             speed: 0.010, baseScale: 1.00 },
  { phase: Math.PI*2/3,   speed: 0.010, baseScale: 1.08 },
  { phase: Math.PI*4/3,   speed: 0.010, baseScale: 1.16 },
];

function drawWater() {
  wc.clearRect(0, 0, wW, wH);
  WAVES.forEach(layer => {
    const baseY = layer.y * wH;
    wc.fillStyle = layer.color;
    for (let x = 0; x < wW; x++) {
      const y = baseY + layer.amp * Math.sin((x*0.022) + t*layer.speed);
      wc.fillRect(x, Math.round(y), 1, layer.thick);
    }
  });

  const cx = wW * 0.497;
  for (let row = 0; row < wH*0.75; row += 2) {
    const progress  = row / (wH*0.75);
    const wobble    = 0.7 + 0.3*Math.sin(t*0.05 + row*0.04);
    const shimWidth = (12 + progress*wW*0.20) * wobble;
    const alpha     = (0.22 - progress*0.18) * (0.6 + 0.4*Math.sin(t*0.035));
    if (alpha < 0.005) continue;
    wc.fillStyle = `rgba(255,220,80,${alpha.toFixed(3)})`;
    wc.fillRect(Math.round(cx - shimWidth/2), row, Math.round(shimWidth), 2);
  }

  const islandCX = wW * 0.500;
  const islandCY = wH * 0.10;
  RIPPLES.forEach((r, i) => {
    const pulse = 0.5 + 0.5*Math.sin(t*r.speed + r.phase);
    const scale = r.baseScale + pulse*0.12;
    const rx    = wW*0.24*scale;
    const ry    = wH*0.10*scale;
    const alpha = (0.18 - i*0.04) * (1 - pulse*0.5);
    if (alpha < 0.01) return;
    wc.strokeStyle = `rgba(200,255,255,${alpha.toFixed(3)})`;
    wc.lineWidth = 1.5;
    wc.beginPath();
    wc.ellipse(islandCX, islandCY, rx, ry, 0, 0, Math.PI*2);
    wc.stroke();
  });
}

// ── FX CANVAS ──────────────────────────────────────────────────
const fxCanvas = document.getElementById('fx-canvas');
const fx = fxCanvas.getContext('2d');
let fW, fH;

function resizeFx() {
  fW = fxCanvas.offsetWidth;
  fH = fxCanvas.offsetHeight;
  fxCanvas.width  = fW;
  fxCanvas.height = fH;
}
resizeFx();

// ── BIRDS — fade in from sky, drift toward sun, fade out ───────
const SUN_X = 0.497;
const SUN_Y = 0.42;

function makeBird() {
  // spawn in upper sky area only — above treeline, never near edges
  return {
    x:         fW * (0.15 + Math.random() * 0.70), // horizontal spread
    y:         fH * (0.02 + Math.random() * 0.08), // upper sky only
    scale: 1.2 + Math.random() * 0.4,           // small, distant
    wingPhase: Math.random() * Math.PI * 2,
    wingSpeed: 0.04 + Math.random() * 0.02,
    speed:     0.4 + Math.random() * 0.25,          // constant speed
    life:      0,                                    // 0→1 lifetime
    done:      false,
  };
}

const birds = [makeBird(), makeBird(), makeBird()];
// stagger starting life so they don't all appear/disappear together
birds[0].life = 0.0;
birds[1].life = 0.3;
birds[2].life = 0.6;

function drawBird(bx, by, wingPhase, scale, alpha) {
  const w   = 7 * scale;
  const dip = 3 * scale * Math.sin(wingPhase);
  fx.strokeStyle = `rgba(20,8,20,${alpha.toFixed(2)})`;
  fx.lineWidth   = 1.0 * scale;
  fx.lineCap     = 'round';
  fx.beginPath();
  fx.moveTo(bx - w, by + dip);
  fx.quadraticCurveTo(bx - w*0.5, by - dip*0.5, bx, by);
  fx.quadraticCurveTo(bx + w*0.5, by - dip*0.5, bx + w, by + dip);
  fx.stroke();
}

function updateBirds() {
  birds.forEach(b => {
    if (b.done) return;

    // advance life
    b.life += 0.0015;

    // fade in first 15% of life, fade out last 20%
    let alpha;
    if (b.life < 0.15) {
      alpha = b.life / 0.15;           // fade in
    } else if (b.life > 0.80) {
      alpha = (1 - b.life) / 0.20;     // fade out
    } else {
      alpha = 1.0;
    }
    alpha = Math.max(0, Math.min(1, alpha)) * 0.82;

    if (b.life >= 1.0) {
      b.done = true;
      setTimeout(() => {
        Object.assign(b, makeBird());
        b.done = false;
      }, 1000 + Math.random() * 4000);
      return;
    }

    // move toward sun at CONSTANT speed (normalize direction)
    const tx  = fW * SUN_X;
    const ty  = fH * SUN_Y;
    const dx  = tx - b.x;
    const dy  = ty - b.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len > 0) {
      const slowdown = Math.min(len / (fH * 0.35), 1); // 1=far, 0=at sun
      const currentSpeed = b.speed * (0.15 + slowdown * 0.85);
      b.x += (dx / len) * currentSpeed;
      b.y += (dy / len) * currentSpeed;
    }

    b.wingPhase += b.wingSpeed;

    // also shrink gently as it approaches
    const distFrac = Math.min(len / (fH * 0.5), 1);
    const drawScale = b.scale * (0.4 + distFrac * 0.6);

    drawBird(b.x, b.y, b.wingPhase, drawScale, alpha);
  });
}

// ── STARS — bigger and much more visible ───────────────────────
const stars = Array.from({length: 22}, () => ({
  x:     Math.random(),
  y:     Math.random() * 0.28,
  phase: Math.random() * Math.PI * 2,
  speed: 0.015 + Math.random() * 0.02,
  size:  Math.random() < 0.3 ? 3 : 2,
}));

function drawStars() {
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
    const alpha   = 0.55 * twinkle + 0.2; // minimum 0.2, max 0.75
    fx.fillStyle  = `rgba(255,248,220,${alpha.toFixed(2)})`;
    fx.fillRect(
      Math.round(s.x * fW),
      Math.round(s.y * fH),
      s.size, s.size
    );
  });
}

// ── FISH — fires every 8 seconds for testing visibility ────────
let fishTimer    = 180; // start quickly so you see it fast
let fishActive   = false;
let fishProgress = 0;
let fishX        = 0;
let fishSide     = 1;

function triggerFish() {
  fishActive   = true;
  fishProgress = 0;
  fishSide     = Math.random() < 0.5 ? 1 : -1;
  fishX        = fW * (0.50 + fishSide * (0.32 + Math.random()*0.08));
}

function drawFish() {
  if (!fishActive) return;

  fishProgress += 0.018;
  if (fishProgress >= 1) { fishActive = false; return; }

  const waterY = fH * 0.70;
  const peakY  = waterY - fH * 0.12; // higher jump
  const p      = fishProgress;
  const arcY   = waterY + (peakY - waterY) * 4 * p * (1-p);
  const arcX   = fishX + fishSide * fW * 0.03 * (p - 0.5);

  if (arcY > waterY) return;

  fx.save();
  fx.translate(arcX, arcY);

  const angle = fishSide * (0.8 - p * 1.6);
  fx.rotate(angle);

  // body — bigger and more vivid
  fx.fillStyle = 'rgba(60,200,220,0.95)';
  fx.fillRect(-7, -4, 14, 7);

  // tail
  fx.fillStyle = 'rgba(30,150,180,0.95)';
  fx.beginPath();
  fx.moveTo(-7,  0);
  fx.lineTo(-14, -5);
  fx.lineTo(-14,  5);
  fx.closePath();
  fx.fill();

  // belly shine
  fx.fillStyle = 'rgba(220,255,255,0.7)';
  fx.fillRect(-4, -2, 8, 3);

  // scales detail
  fx.fillStyle = 'rgba(20,120,160,0.6)';
  fx.fillRect(-2, -3, 3, 2);
  fx.fillRect( 2, -3, 3, 2);

  // splash
  if (fishProgress < 0.1 || fishProgress > 0.85) {
    fx.fillStyle = 'rgba(200,245,255,0.7)';
    for (let d = 0; d < 5; d++) {
      const a2 = (d/5) * Math.PI * 2;
      const sr = 6 + Math.random()*4;
      fx.fillRect(
        Math.round(Math.cos(a2)*sr) - 1,
        Math.round(Math.sin(a2)*sr) - 1,
        3, 3
      );
    }
  }

  fx.restore();
}

// ── DRINK GLINT — fires every 4 seconds ────────────────────────
let glintTimer  = 60;
let glintActive = false;
let glintLife   = 0;

function drawDrinkGlint() {
  if (!glintActive) return;

  glintLife++;
  if (glintLife > 35) { glintActive = false; glintLife = 0; return; }

  const gx   = fW  * 0.458;
  const gy   = fH  * 0.733;
  const fade = Math.sin((glintLife / 35) * Math.PI);
  const r1   = 8  * fade;
  const r2   = 14 * fade;

  // outer soft glow
  fx.strokeStyle = `rgba(255,255,180,${(0.5*fade).toFixed(2)})`;
  fx.lineWidth   = 3;
  fx.beginPath();
  fx.arc(gx, gy, r2*0.6, 0, Math.PI*2);
  fx.stroke();

  // 4-point star
  fx.strokeStyle = `rgba(255,255,220,${(0.95*fade).toFixed(2)})`;
  fx.lineWidth   = 2;
  fx.lineCap     = 'round';
  // horizontal
  fx.beginPath(); fx.moveTo(gx-r2, gy); fx.lineTo(gx+r2, gy); fx.stroke();
  // vertical
  fx.beginPath(); fx.moveTo(gx, gy-r2); fx.lineTo(gx, gy+r2); fx.stroke();
  // diagonals (shorter)
  fx.strokeStyle = `rgba(255,255,200,${(0.6*fade).toFixed(2)})`;
  fx.lineWidth   = 1.5;
  fx.beginPath(); fx.moveTo(gx-r1, gy-r1); fx.lineTo(gx+r1, gy+r1); fx.stroke();
  fx.beginPath(); fx.moveTo(gx+r1, gy-r1); fx.lineTo(gx-r1, gy+r1); fx.stroke();

  // centre bright dot
  fx.fillStyle = `rgba(255,255,255,${(0.9*fade).toFixed(2)})`;
  fx.fillRect(gx-2, gy-2, 4, 4);
}

// ── MAIN LOOP ──────────────────────────────────────────────────
function loop() {
  t++;
  drawWater();

  fx.clearRect(0, 0, fW, fH);
  drawStars();
  updateBirds();
  drawFish();
  drawDrinkGlint();

  // fish timer
  fishTimer--;
  if (fishTimer <= 0 && !fishActive) {
    triggerFish();
    fishTimer = 480 + Math.floor(Math.random()*300); // every 8-13s
  }

  // glint timer
  glintTimer--;
  if (glintTimer <= 0 && !glintActive) {
    glintActive = true;
    glintLife   = 0;
    glintTimer  = 200 + Math.floor(Math.random()*150);
  }

  requestAnimationFrame(loop);
}

loop();

window.addEventListener('resize', () => {
  setTimeout(() => { resizeWater(); resizeFx(); }, 50);
});

// ── SOUND ──────────────────────────────────────────────────────
const TRACKS = [
  'audio/florida-juice.wav',
  'audio/lemon-trees.wav',
  'audio/lucky-day.wav',
  'audio/players-paradise.wav',
  'audio/space-rhodes.wav',
];

// ↑ rename these to match your actual filenames exactly
// e.g. 'audio/looperman-l-1234567-0123456-chill-rhodes.wav'

let currentTrack  = 0;
let currentAudio  = null;
let nextAudio     = null;
let soundOn       = false;
let hasStarted    = false;
const FADE_TIME   = 2.0; // seconds to crossfade
const FADE_STEPS  = 40;

function createAudio(src, volume) {
  const a = new Audio(src);
  a.volume = volume;
  a.preload = 'auto';
  return a;
}

function fadeOut(audio, duration, onDone) {
  if (!audio) return;
  const startVol = audio.volume;
  const step     = startVol / FADE_STEPS;
  const interval = (duration * 1000) / FADE_STEPS;
  const timer = setInterval(() => {
    audio.volume = Math.max(0, audio.volume - step);
    if (audio.volume <= 0) {
      clearInterval(timer);
      audio.pause();
      audio.currentTime = 0;
      if (onDone) onDone();
    }
  }, interval);
}

function fadeIn(audio, duration) {
  audio.volume = 0;
  audio.play().catch(() => {});
  const step     = 1 / FADE_STEPS;
  const interval = (duration * 1000) / FADE_STEPS;
  const timer = setInterval(() => {
    audio.volume = Math.min(1, audio.volume + step);
    if (audio.volume >= 1) clearInterval(timer);
  }, interval);
}

function playNext() {
  currentTrack = (currentTrack + 1) % TRACKS.length;
  nextAudio    = createAudio(TRACKS[currentTrack], 0);

  // preload slightly before current track ends
  nextAudio.addEventListener('canplaythrough', () => {
    fadeOut(currentAudio, FADE_TIME, () => {
      currentAudio = nextAudio;
      nextAudio    = null;
      // schedule next transition
      scheduleNext();
    });
    fadeIn(nextAudio, FADE_TIME);
    currentAudio = nextAudio;
  }, { once: true });
}

function scheduleNext() {
  if (!currentAudio || !soundOn) return;
  // trigger crossfade 2.5s before end
  const timeUntilEnd = (currentAudio.duration - currentAudio.currentTime) - 2.5;
  const delay = Math.max(0, timeUntilEnd * 1000);
  setTimeout(() => {
    if (soundOn) playNext();
  }, delay);
}

function startMusic() {
  currentTrack = 0;
  currentAudio = createAudio(TRACKS[currentTrack], 0);
  fadeIn(currentAudio, FADE_TIME);
  currentAudio.addEventListener('canplaythrough', () => {
    scheduleNext();
  }, { once: true });
}

function toggleSound() {
  const btn = document.getElementById('sound-btn');
  if (!soundOn) {
    soundOn = true;
    btn.textContent = '♪ SOUND OFF';
    if (!hasStarted) {
      hasStarted = true;
      startMusic();
    } else {
      if (currentAudio) fadeIn(currentAudio, 1.0);
    }
  } else {
    soundOn = false;
    btn.textContent = '♪ SOUND ON';
    fadeOut(currentAudio, 1.0);
  }
}

// autostart on first interaction anywhere
document.addEventListener('click', () => {
  if (!hasStarted) {
    hasStarted = true;
    soundOn = true;
    document.getElementById('sound-btn').textContent = '♪ SOUND OFF';
    startMusic();
    // fade out the prompt
    const prompt = document.getElementById('music-prompt');
    prompt.classList.add('prompt-hide');
    setTimeout(() => prompt.style.display = 'none', 1200);
  }
}, { once: true });


</script>
</body>
</html>
